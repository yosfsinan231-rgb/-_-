name: Create New Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: 'true'
          fetch-depth: 0
      
      - name: Use Xcode 26.2
        run: |
          sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Compile YosfMobile
        run: | 
          agvtool new-version -all $(git rev-parse HEAD) || true
          make
          mkdir -p upload
          # گەڕان بەدوای فایلی ipa و گواستنەوەیان بۆ فۆڵدەری upload
          find . -name "*.ipa" -exec mv {} upload/ \;
          test -n "$(find upload -name "*.ipa" -print -quit)"

      - name: Get Version
        id: get_version
        run: |
          # هەوڵدان بۆ خوێندنەوەی ڤێرژن لە فایلی Info.plist
          VERSION=$(find . -name "Info.plist" -exec /usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" {} \; 2>/dev/null | head -n 1)
          if [ -z "$VERSION" ]; then
            VERSION="1.0.0"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: YosfMobile v${{ env.VERSION }}
          # زیادکردنی ژمارەی ڕەن بۆ ئەوەی تاگی دووبارە دروست نەبێت
          tag_name: v${{ env.VERSION }}-${{ github.run_number }}
          files: |
            upload/*.ipa
            **/*.ipa
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
